name: Build Android APK From Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip vibe.zip -d project_root
          echo "Listing extracted files:"
          ls -R project_root

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission for Gradle Wrapper
        run: |
          if [ -f "project_root/gradlew" ]; then
            chmod +x project_root/gradlew
          else
            echo "gradlew not found in project_root, checking subfolders..."
            SUBFOLDER=$(find project_root -maxdepth 2 -name gradlew -exec dirname {} \;)
            if [ ! -z "$SUBFOLDER" ]; then
              chmod +x "$SUBFOLDER/gradlew"
              echo "SUBFOLDER_PATH=$SUBFOLDER" >> $GITHUB_ENV
            fi
          fi

      - name: Build APK
        run: |
          if [ ! -z "$SUBFOLDER_PATH" ]; then
            cd "$SUBFOLDER_PATH"
            ./gradlew assembleDebug
          else
            cd project_root
            ./gradlew assembleDebug
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vibe-App-Debug-APK
          path: |
            project_root/**/build/outputs/apk/debug/*.apk
