name: Build Android APK From Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: unzip vibe.zip -d project_root

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Find Project and Build
        run: |
          # Gradlew එක තියෙන ෆෝල්ඩර් එක හොයාගන්නවා
          GRADLEW_DIR=$(find project_root -name "gradlew" -exec dirname {} \;)
          
          if [ -z "$GRADLEW_DIR" ]; then
            echo "Error: gradlew ෆයිල් එක හොයාගන්න බැරි වුණා!"
            exit 1
          fi
          
          echo "ප්‍රොජෙක්ට් එක හොයාගත්තා: $GRADLEW_DIR"
          cd "$GRADLEW_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vibe-App-Debug-APK
          path: project_root/**/build/outputs/apk/debug/*.apk
